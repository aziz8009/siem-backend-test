version: "3.9"

services:
    postgres:
        image: postgres:15-alpine
        container_name: siem-postgres
        restart: unless-stopped

        environment:
            POSTGRES_USER: backend_user
            POSTGRES_PASSWORD: secretpassword
            POSTGRES_DB: siem_db

        ports:
            - "5432:5432"

        volumes:
            - postgres_data:/var/lib/postgresql/data

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U backend_user -d siem_db"]
            interval: 5s
            timeout: 5s
            retries: 10

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.8.1
        container_name: siem-elasticsearch
        restart: unless-stopped

        environment:
            discovery.type: single-node
            xpack.security.enabled: "false"
            ES_JAVA_OPTS: "-Xms512m -Xmx512m"

        ports:
            - "9200:9200"

        volumes:
            - elasticsearch_data:/usr/share/elasticsearch/data

        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9200 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 20

    kibana:
        image: docker.elastic.co/kibana/kibana:8.8.1
        container_name: siem-kibana

        restart: unless-stopped

        environment:
            ELASTICSEARCH_HOSTS: http://elasticsearch:9200

        ports:
            - "5601:5601"

        depends_on:
            elasticsearch:
                condition: service_healthy

    app:
        build:
            context: .
            dockerfile: Dockerfile

        container_name: siem-backend

        restart: unless-stopped

        environment:
            NODE_ENV: development

            PORT: 3000

            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: backend_user
            DB_PASSWORD: secretpassword
            DB_NAME: siem_db

            ELASTICSEARCH_URL: http://elasticsearch:9200

        ports:
            - "3000:3000"

        depends_on:
            postgres:
                condition: service_healthy

            elasticsearch:
                condition: service_healthy

        command: npm run dev

        volumes:
            - .:/app
            - /app/node_modules

volumes:
    postgres_data:
    elasticsearch_data:
